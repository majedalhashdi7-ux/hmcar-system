# [[ARABIC_HEADER]] هذا الملف (docker-compose.yml) جزء من مشروع HM CAR ويحتوي تعليقات عربية لضمان الوضوح.

services:
  # MongoDB Database
  mongodb:
    image: mongo:8.2
    container_name: car-auction-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: car-auction
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - car-auction-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: car-auction-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - car-auction-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Car Auction Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-auction-app
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      PORT: 4001
      MONGO_URI: mongodb://mongodb:27017/car-auction
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      BASE_URL: ${BASE_URL:-http://localhost:4001}
    volumes:
      - ./uploads:/app/uploads:delegated
      - ./public/images:/app/public/images:delegated
      - ./logs:/app/logs:delegated
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - car-auction-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/api/v2/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  car-auction-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
