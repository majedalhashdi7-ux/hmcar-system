<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <!-- Background -->
  <rect width="200" height="60" fill="#07162a" rx="8"/>
  
  <!-- Car Icon -->
  <g transform="translate(15, 18)">
    <!-- Car body -->
    <path d="M5 15 L3 20 L25 20 L23 15 Z" fill="#d4af37" stroke="#fff" stroke-width="0.5"/>
    <rect x="3" y="20" width="22" height="8" fill="#d4af37" stroke="#fff" stroke-width="0.5" rx="2"/>
    <!-- Windows -->
    <rect x="7" y="16" width="6" height="4" fill="#07162a" opacity="0.6" rx="0.5"/>
    <rect x="15" y="16" width="6" height="4" fill="#07162a" opacity="0.6" rx="0.5"/>
    <!-- Wheels -->
    <circle cx="8" cy="29" r="3" fill="#fff"/>
    <circle cx="8" cy="29" r="1.5" fill="#07162a"/>
    <circle cx="20" cy="29" r="3" fill="#fff"/>
    <circle cx="20" cy="29" r="1.5" fill="#07162a"/>
  </g>
  
  <!-- Text: HM CAR -->
  <text x="55" y="32" font-family="'Montserrat', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">
    HM CAR
  </text>
  <text x="55" y="47" font-family="'Montserrat', Arial, sans-serif" font-size="9" font-weight="400" fill="#d4af37" letter-spacing="2">
    AUCTION
  </text>
  
  <!-- Decorative line -->
  <line x1="50" y1="15" x2="50" y2="50" stroke="#d4af37" stroke-width="2"/>
</svg>
