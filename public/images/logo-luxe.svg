<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" role="img" aria-labelledby="title desc">
  <title id="title">HM CAR Luxury Mark</title>
  <desc id="desc">An elegant gold wordmark with a fluid car silhouette.</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e3b3" />
      <stop offset="45%" stop-color="#f7d48b" />
      <stop offset="100%" stop-color="#c9972f" />
    </linearGradient>
    <linearGradient id="deep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b1f3a" />
      <stop offset="100%" stop-color="#0c2c55" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.9  0 0 0 0 0.75  0 0 0 0 0.45  0 0 0 0.55 0" />
    </filter>
  </defs>

  <rect x="16" y="26" width="528" height="148" rx="26" fill="#0b1f3a" opacity="0.12" />
  <rect x="10" y="20" width="540" height="148" rx="30" fill="url(#deep)" />
  <rect x="10" y="20" width="540" height="148" rx="30" fill="url(#deep)" opacity="0.28" />
  <rect x="10" y="20" width="540" height="148" rx="30" fill="url(#gold)" opacity="0.06" />

  <path d="M90 110c38-42 102-66 170-64 64 2 107 18 132 32 16 9 27 19 35 30 3 5 1 10-4 11-7 1-14-5-21-9-18-11-48-23-98-27-58-5-108 6-156 40-5 4-13 3-16-2-2-4-1-8 3-11z" fill="url(#gold)" filter="url(#glow)" opacity="0.55" />
  <path d="M88 108c42-45 111-70 192-64 74 5 128 29 159 59 7 7 2 17-8 16-48-5-87-40-153-42-64-2-109 24-150 56-7 5-17 1-19-7-1-6 3-13 9-18z" fill="url(#gold)" />

  <g fill="#fefefe" font-family="'Montserrat','Poppins','Segoe UI',sans-serif" font-weight="800" text-rendering="optimizeLegibility">
    <text x="76" y="150" font-size="46" letter-spacing="0.08em">HM CAR</text>
  </g>

  <g fill="url(#gold)">
    <text x="78" y="150" font-size="46" font-family="'Montserrat','Poppins','Segoe UI',sans-serif" font-weight="900" letter-spacing="0.08em">HM CAR</text>
  </g>

  <g fill="#fefefe" opacity="0.9" font-family="'Poppins','Segoe UI',sans-serif" font-size="15" font-weight="600" letter-spacing="0.18em">
    <text x="78" y="173">PREMIUM AUCTIONS &amp; MOTORS</text>
  </g>
